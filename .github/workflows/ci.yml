name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.38.2

jobs:
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run analyzer
        run: dart analyze

      - name: Check code formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Run code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check for stale generated files
        run: |
          echo "🔍 Checking for stale generated files..."
          if ! git diff --quiet; then
            echo ""
            echo "❌ FAILED: Generated files are stale!"
            echo "📝 The following files were modified by build_runner:"
            echo ""
            git diff --name-only
            echo ""
            echo "⚠️  This usually means one of the following:"
            echo "  1. You modified a Dart file that requires code generation"
            echo "  2. You modified a Drift schema (.drift files)"
            echo "  3. You modified a Freezed model or injectable class"
            echo "  4. You modified a GoRouter route definition"
            echo ""
            echo "🔧 Fix: Run this locally before committing:"
            echo "   dart run build_runner build --delete-conflicting-outputs"
            echo "   git add -A && git commit"
            echo ""
            exit 1
          else
            echo "✅ All generated files are up to date"
          fi

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=github

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: flutter
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Check coverage threshold (minimum 70%)
        run: |
          if [ ! -f coverage/coverage-summary.xml ]; then
            echo "⚠️ coverage/coverage-summary.xml not found; skipping coverage threshold check"
            exit 0
          fi

          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' coverage/coverage-summary.xml | head -1)
          COVERAGE=$(echo "$COVERAGE * 100" | bc)
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage ($COVERAGE%) below 70% threshold!"
            exit 1
          fi
          echo "✅ Coverage ($COVERAGE%) meets 70% threshold"

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK (Release)
        run: |
          flutter build apk \
            --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Comment APK size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'build/app/outputs/flutter-apk/app-release.apk';
            if (fs.existsSync(path)) {
              const stats = fs.statSync(path);
              const sizeMB = (stats.size / (1024 * 1024)).toFixed(2);
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `📱 **Android APK Size**: ${sizeMB} MB`
              });
            }

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v3
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS App (Release, no codesign)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Create IPA (ad-hoc provisioning)
        run: |
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r app-release.ipa Payload/
          mv app-release.ipa ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: app-release.ipa
          retention-days: 30
          if-no-files-found: warn

      - name: Comment IPA size on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'app-release.ipa';
            if (fs.existsSync(path)) {
              const stats = fs.statSync(path);
              const sizeMB = (stats.size / (1024 * 1024)).toFixed(2);
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `📱 **iOS IPA Size**: ${sizeMB} MB`
              });
            }

  notify-success:
    name: Notification
    runs-on: ubuntu-latest
    needs: [analyze, test, build-android, build-ios]
    if: success()
    steps:
      - name: Success notification
        run: echo "✅ All CI/CD checks passed!"
