workflows:
  release:
    name: Dual Platform Release (Android & iOS)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - signing_configs
      vars:
        APP_VERSION: "1.0.0"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Dependencies
        script: flutter pub get
      - name: Build Runner
        script: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Unit Tests
        script: flutter test
      - name: Android Signing Setup
        script: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > android/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF
      - name: Build Android AAB
        script: |
          flutter build appbundle \
            --release \
            --build-name=$APP_VERSION \
            --build-number=$BUILD_NUMBER
      - name: Build iOS IPA
        script: |
          # Requires certificates in signing_configs
          flutter build ipa --release --no-codesign \
            --build-name=$APP_VERSION \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/bundle/**/*.aab
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - abdullah@word-flow.com
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_KEY
        track: production
        submit_as_draft: false
