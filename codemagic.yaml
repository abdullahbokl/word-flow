workflows:
  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2 # Good for flutter builds
    environment:
      flutter: stable
      groups:
        - signing_configs # User should define this in Codemagic UI
    triggering:
      events:
        - push
      branches:
        - main
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Generate build files
        script: flutter packages pub run build_runner build --delete-conflicting-outputs
      - name: Build Android App Bundle
        script: |
          # Use release.sh or inline command
          flutter build appbundle \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --release \
            --build-name=1.0.0 \
            --build-number=$(date +%Y%m%d%H%M)
    artifacts:
      - build/app/outputs/bundle/**/*.aab
      - build/app/outputs/flutter-apk/**/*.apk
      - build/app/outputs/symbols/**/*.symbols
    publishing:
      email:
        recipients:
          - user@example.com # Placeholder
