name: lexitrack
description: High-performance English vocabulary tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fpdart: ^1.1.0
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.2
  path: ^1.9.0
  get_it: ^9.2.1
  equatable: ^2.0.5
  google_fonts: ^8.0.2
  intl: ^0.20.2
  rxdart: ^0.28.0
  flutter_animate: ^4.5.2
  sliver_tools: ^0.2.12
  file_picker: ^11.0.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.15.0
  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  freezed: ^3.2.3
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
