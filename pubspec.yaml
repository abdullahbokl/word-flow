name: word_flow
description: >
  WordFlow — An offline-first vocabulary learning app built with Flutter.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.0.0
  freezed_annotation: ^2.4.4
  equatable: ^2.0.7
  fpdart: ^1.1.0
  get_it: ^8.0.2
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  path: ^1.9.1
  uuid: ^4.5.1
  go_router: ^17.1.0
  collection: ^1.19.1
  go_router_builder: ^3.0.0
  talker: ^5.1.16
  shimmer: ^3.0.0
  flutter_secure_storage: ^10.0.0
  sqlite3_flutter_libs: ^0.5.42
  sqlite3: ^2.9.4
  http: ^1.6.0
  shared_preferences: ^2.5.5
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  freezed: ^2.5.7
  build_runner: ^2.5.4
  injectable_generator: ^2.6.2
  drift_dev: ^2.18.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  json_serializable: ^6.9.0
  fake_async: ^1.3.3

flutter:
  uses-material-design: true

  assets:
    - assets/stopwords/
    - assets/fonts/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
