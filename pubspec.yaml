name: lexitrack
description: High-performance English vocabulary tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  fpdart: ^1.1.0
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0
  get_it: ^7.6.7
  equatable: ^2.0.5
  google_fonts: ^6.1.0
  intl: ^0.20.2
  rxdart: ^0.28.0
  flutter_animate: ^4.5.2
  sliver_tools: ^0.2.12
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.15.0
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
