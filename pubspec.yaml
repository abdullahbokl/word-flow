name: lexitrack
description: High-performance English vocabulary tracker.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  bloc_concurrency: ^0.3.0
  drift: ^2.20.0
  drift_flutter: ^0.2.8
  equatable: ^2.0.5
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  fpdart: ^1.1.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  googleapis_auth: ^1.6.0
  http: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  path: ^1.9.0
  path_provider: ^2.1.2
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5
  sliver_tools: ^0.2.12
  sqlite3: ^2.5.0
  sqlite3_flutter_libs: ^0.5.42
  sqlite3_web: ^0.4.1

dev_dependencies:
  integration_test:
    sdk: flutter
  bloc_test: ^10.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.15.0
  fake_async: ^1.3.1
  flutter_lints: ^6.0.0
